<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpatialAV Data Viewer</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --panel: rgba(255, 255, 255, 0.95);
      --panel-strong: #ffffff;
      --line: rgba(0, 0, 0, 0.08);
      --text: #1a1d23;
      --muted: #6b7280;
      --accent: #374151;
      --accent-soft: rgba(55, 65, 81, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      --radius: 16px;
      --radius-sm: 10px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: "Inter", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--text);
      background: #f0f2f5;
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: 100vh;
      gap: 18px;
      padding: 18px;
    }

    .sidebar,
    .content {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header,
    .content-header {
      flex: 0 0 auto;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.15;
    }

    h1 {
      font-size: 30px;
    }

    .subtle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      padding: 18px 22px;
      display: grid;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="search"],
    select,
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 13px;
      font: inherit;
      background: rgba(255, 255, 255, 0.84);
      color: var(--text);
    }

    .task-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .task-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: 160ms ease;
    }

    .task-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fffaf5;
      transform: translateY(-1px);
    }

    .sample-list {
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .sample-card {
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.66);
      border-radius: 16px;
      padding: 22px 24px;
      cursor: pointer;
      transition: 180ms ease;
      min-height: 56px;
    }

    .sample-card:hover {
      border-color: rgba(182, 94, 60, 0.35);
      transform: translateY(-1px);
    }

    .sample-card.active {
      background: linear-gradient(135deg, rgba(182, 94, 60, 0.18), rgba(255, 255, 255, 0.92));
      border-color: rgba(182, 94, 60, 0.46);
    }

    .sample-id {
      font-family: var(--mono);
      font-size: 15px;
      word-break: break-all;
      line-height: 1.4;
    }

    .meta-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .content {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── 새 좌우 분할 레이아웃 ── */
    .detail-layout {
      display: grid;
      grid-template-columns: minmax(280px, 1.6fr) minmax(260px, 1fr);
      gap: 18px;
      padding: 18px;
      height: 100%;
      overflow: hidden;
      min-height: 0;
      box-sizing: border-box;
    }

    .detail-left {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .detail-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      min-height: 0;
    }

    .task-names-panel {
      flex: 0 0 auto;
      padding: 12px 14px;
    }

    .task-records-panel {
      flex: 1 1 0;
      overflow-y: auto;
      min-height: 0;
    }

    .task-name-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .task-name-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      transition: 160ms ease;
    }

    .task-name-chip:hover {
      border-color: rgba(182, 94, 60, 0.4);
      color: var(--accent);
    }

    .task-name-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fffaf5;
      transform: translateY(-1px);
    }

    .task-record-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .task-record-header h3 {
      margin: 0;
      font-size: 15px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(320px, 1.2fr) minmax(280px, 0.8fr);
      gap: 18px;
    }

    .panel {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .media-frame {
      min-height: 120px;
      max-height: 50vh;
      border-radius: 16px;
      overflow: hidden;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-frame img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .empty-media {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }

    audio {
      width: 100%;
      margin-top: 14px;
    }

    .path {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(121, 100, 85, 0.08);
      border-radius: 12px;
      font-family: var(--mono);
      font-size: 12px;
      word-break: break-all;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: rgba(182, 94, 60, 0.08);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .task-section {
      display: grid;
      gap: 14px;
    }

    .task-grid {
      display: grid;
      gap: 14px;
    }

    .task-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .task-title-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .task-title {
      font-size: 18px;
    }

    .record {
      border-top: 1px dashed rgba(121, 100, 85, 0.22);
      padding-top: 12px;
      margin-top: 12px;
    }

    .record:first-of-type {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    .qa {
      display: grid;
      gap: 10px;
    }

    .key {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 4px;
    }

    .value {
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .kv-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .kv {
      padding: 12px;
      border-radius: 14px;
      background: rgba(121, 100, 85, 0.06);
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(121, 100, 85, 0.08);
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      background: rgba(170, 57, 57, 0.12);
      color: #9e3131;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 46vh;
      }

      .hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .sidebar-header,
      .content-header,
      .content-body,
      .controls {
        padding-left: 14px;
        padding-right: 14px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <p class="eyebrow">SpatialAV</p>
        <h1>Data Viewer</h1>
        <p class="subtle">Browse samples with images, audio, and task records.</p>
      </div>

      <div class="controls">
        <div>
          <label for="search-input">Search</label>
          <input id="search-input" type="search" placeholder="sample_id or task name">
        </div>

        <div>
          <label for="sort-select">Sort</label>
          <select id="sort-select">
            <option value="id-asc">sample_id A→Z</option>
            <option value="id-desc">sample_id Z→A</option>
            <option value="tasks-desc">Most tasks first</option>
            <option value="tasks-asc">Fewest tasks first</option>
          </select>
        </div>

        <div>
          <label>Task Filter</label>
          <div id="task-filters" class="task-filters"></div>
        </div>

        <div id="status" class="status">Loading json file...</div>
      </div>

      <div id="sample-list" class="sample-list"></div>
    </aside>

    <main class="content">
      <div class="content-header">
        <p class="eyebrow">NeurIPS 2026</p>
        <h2>Hear, Localize, and Reason: Spatially Aware Scene Understanding for Audio-Visual LLMs</h2>
        <p id="detail-subtitle" class="subtle">Select a sample from the list on the left.</p>
      </div>

      <div id="detail-body"
        style="flex: 1 1 0; display: flex; flex-direction: column; min-height: 0; overflow: hidden;">
        <div class="content-top">
          <div class="panel">
            <p class="muted">No sample selected yet.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      samples: [],
      filteredSamples: [],
      selectedSampleId: null,
      selectedTaskFilter: null,
      selectedTaskRecord: null,
      searchText: "",
      sortMode: "id-asc",
    };

    const sampleListEl = document.getElementById("sample-list");
    const detailSubtitleEl = document.getElementById("detail-subtitle");
    const detailBodyEl = document.getElementById("detail-body");
    const statusEl = document.getElementById("status");
    const searchInputEl = document.getElementById("search-input");
    const sortSelectEl = document.getElementById("sort-select");
    const taskFiltersEl = document.getElementById("task-filters");


    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function normalizeMediaPath(path) {
      if (!path || typeof path !== "string") {
        return "";
      }
      if (path.startsWith("http://") || path.startsWith("https://") || path.startsWith("file://")) {
        return path;
      }
      if (path.startsWith("/")) {
        return `file://${path}`;
      }
      return path;
    }

    function summarizeTasks(tasks) {
      return Object.keys(tasks || {}).sort();
    }

    function loadSamplesFromObject(raw) {
      const samples = Object.entries(raw).map(([sampleId, item]) => {
        const tasks = item.tasks || {};
        return {
          sampleId,
          image: item.image || "",
          audio: item.audio || "",
          tasks,
          taskNames: summarizeTasks(tasks),
          taskCount: Object.keys(tasks).length,
        };
      });

      state.samples = samples;
      state.selectedTaskFilter = null;
      renderTaskFilters();
      applyFilters();
      setStatus(`Loaded ${samples.length.toLocaleString()} samples.`);
    }

    async function tryAutoLoad() {
      try {
        const response = await fetch("./merged_by_sample_0506.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const raw = await response.json();
        loadSamplesFromObject(raw);
      } catch (error) {
        setStatus(
          "Failed to load json file.",
          true
        );
      }
    }

    function renderTaskFilters() {
      const allTasks = Array.from(new Set(state.samples.flatMap((sample) => sample.taskNames))).sort();
      const chips = [
        { label: "All", value: null },
        ...allTasks.map((task) => ({ label: task, value: task })),
      ];

      taskFiltersEl.innerHTML = "";
      for (const chip of chips) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "task-chip";
        button.textContent = chip.label;
        if (state.selectedTaskFilter === chip.value) {
          button.classList.add("active");
        }
        button.addEventListener("click", () => {
          state.selectedTaskFilter = chip.value;
          renderTaskFilters();
          applyFilters();
        });
        taskFiltersEl.appendChild(button);
      }
    }

    function applyFilters() {
      const query = state.searchText.trim().toLowerCase();
      let items = [...state.samples];

      if (state.selectedTaskFilter) {
        items = items.filter((sample) => sample.taskNames.includes(state.selectedTaskFilter));
      }

      if (query) {
        items = items.filter((sample) => {
          return sample.sampleId.toLowerCase().includes(query)
            || sample.taskNames.some((task) => task.toLowerCase().includes(query));
        });
      }

      items.sort((a, b) => {
        if (state.sortMode === "id-desc") {
          return b.sampleId.localeCompare(a.sampleId);
        }
        if (state.sortMode === "tasks-desc") {
          return b.taskCount - a.taskCount || a.sampleId.localeCompare(b.sampleId);
        }
        if (state.sortMode === "tasks-asc") {
          return a.taskCount - b.taskCount || a.sampleId.localeCompare(b.sampleId);
        }
        return a.sampleId.localeCompare(b.sampleId);
      });

      state.filteredSamples = items;

      if (!items.length) {
        state.selectedSampleId = null;
      } else if (!items.some((sample) => sample.sampleId === state.selectedSampleId)) {
        state.selectedSampleId = items[0].sampleId;
      }

      renderSampleList();
      renderDetail();
    }

    function renderSampleList() {
      sampleListEl.innerHTML = "";

      if (!state.filteredSamples.length) {
        const empty = document.createElement("div");
        empty.className = "panel";
        empty.innerHTML = '<p class="muted">No samples match the filter.</p>';
        sampleListEl.appendChild(empty);
        return;
      }

      for (const sample of state.filteredSamples) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "sample-card";
        if (sample.sampleId === state.selectedSampleId) {
          card.classList.add("active");
        }
        card.innerHTML = `
          <div class="sample-id">${escapeHtml(sample.sampleId)}</div>
          <div class="meta-row">
            <span class="pill">${sample.taskCount} tasks</span>
            <span class="pill">${escapeHtml(sample.taskNames.slice(0, 2).join(" · ") || "no task")}</span>
          </div>
        `;
        card.addEventListener("click", () => {
          state.selectedSampleId = sample.sampleId;
          renderSampleList();
          renderDetail();
        });
        sampleListEl.appendChild(card);
      }
    }

    function renderDetail() {
      const sample = state.filteredSamples.find((item) => item.sampleId === state.selectedSampleId);

      if (!sample) {
        detailSubtitleEl.textContent = "Select a sample from the list on the left.";
        detailBodyEl.innerHTML = '<div class="detail-layout"><div class="detail-left"><div class="panel"><p class="muted">No sample to display.</p></div></div></div>';
        return;
      }

      detailSubtitleEl.textContent = `${sample.sampleId}  ·  ${sample.taskCount} task${sample.taskCount === 1 ? '' : 's'}`;

      // Reset selected task record to first task when sample changes
      if (!state.selectedTaskRecord || !sample.taskNames.includes(state.selectedTaskRecord)) {
        state.selectedTaskRecord = sample.taskNames[0] || null;
      }

      const imageUrl = normalizeMediaPath(sample.image);
      const audioUrl = normalizeMediaPath(sample.audio);

      detailBodyEl.innerHTML = `
        <div class="detail-layout">
          <!-- 왼쪽: 이미지 + 오디오 -->
          <div class="detail-left">
            <div class="panel" style="display:flex; flex-direction:column; align-items:center;">
              <div class="media-frame">
                ${imageUrl ? `<img src="${escapeAttribute(imageUrl)}" alt="${escapeAttribute(sample.sampleId)}">` : '<div class="empty-media">No image available.</div>'}
              </div>
              ${audioUrl ? `<audio controls preload="metadata" src="${escapeAttribute(audioUrl)}"></audio>` : ""}

            </div>
          </div>

          <!-- 오른쪽: task names (얇게) + task records (스크롤) -->
          <div class="detail-right">
            <div class="task-names-panel panel">
              <div class="key">Task Names</div>
              <div id="task-name-chips" class="task-name-chips"></div>
            </div>

            <div class="task-records-panel">
              <div class="task-record-header">
                <h3>Task Records</h3>
                <span class="pill" id="task-record-label"></span>
              </div>
              <div id="task-record-body" class="task-grid"></div>
            </div>
          </div>
        </div>
      `;

      renderTaskNameChips(sample);
      renderTaskRecordBody(sample);
    }

    function renderTaskNameChips(sample) {
      const chipsEl = document.getElementById("task-name-chips");
      if (!chipsEl) return;
      chipsEl.innerHTML = "";
      for (const taskName of sample.taskNames) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "task-name-chip" + (taskName === state.selectedTaskRecord ? " active" : "");
        btn.textContent = taskName;
        btn.addEventListener("click", () => {
          state.selectedTaskRecord = taskName;
          // Re-render chips active state
          chipsEl.querySelectorAll(".task-name-chip").forEach(el => el.classList.remove("active"));
          btn.classList.add("active");
          renderTaskRecordBody(sample);
        });
        chipsEl.appendChild(btn);
      }
    }

    function renderTaskRecordBody(sample) {
      const bodyEl = document.getElementById("task-record-body");
      const labelEl = document.getElementById("task-record-label");
      if (!bodyEl) return;
      const taskName = state.selectedTaskRecord;
      if (!taskName) {
        bodyEl.innerHTML = '<p class="muted">No task selected.</p>';
        return;
      }
      if (labelEl) labelEl.textContent = taskName;
      bodyEl.innerHTML = renderTaskCard(taskName, sample.tasks[taskName]);
    }

    function renderTaskCard(taskName, records) {
      const safeRecords = Array.isArray(records) ? records : [];
      const recordHtml = safeRecords.map((record, index) => {
        const q = record?.Q ?? "";
        const a = record?.A ?? "";

        return `
          <div class="record">
            <div class="task-title-row">
              <span class="pill">record ${index + 1}</span>
            </div>
            <div class="qa">
              <div>
                <div class="key">Question</div>
                <div class="value">${escapeHtml(q)}</div>
              </div>
              <div class="kv">
                <div class="key">Answer</div>
                <div class="value">${escapeHtml(a)}</div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      return `
        <article class="task-card">
          <div class="task-title-row">
            <h3 class="task-title">${escapeHtml(taskName)}</h3>
            <span class="pill">${safeRecords.length} record${safeRecords.length === 1 ? "" : "s"}</span>
          </div>
          ${recordHtml || '<p class="muted">No records.</p>'}
        </article>
      `;
    }

    function formatValue(value) {
      if (typeof value === "string") {
        return value;
      }
      return JSON.stringify(value, null, 2);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    searchInputEl.addEventListener("input", (event) => {
      state.searchText = event.target.value;
      applyFilters();
    });

    sortSelectEl.addEventListener("change", (event) => {
      state.sortMode = event.target.value;
      applyFilters();
    });

    tryAutoLoad();
  </script>
</body>

</html>
